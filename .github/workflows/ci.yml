name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: plugins/codex-fallback-router/package-lock.json
      - run: npm ci
        working-directory: plugins/codex-fallback-router
      - run: npm test
        working-directory: plugins/codex-fallback-router
      - run: npm run secret-scan
        working-directory: plugins/codex-fallback-router
